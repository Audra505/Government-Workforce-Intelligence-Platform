name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Install, Lint, Build, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: govplatform
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: gov_workforce_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://govplatform:devpassword@localhost:5432/gov_workforce_dev
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: Migrate database
        run: npm run db:migrate:deploy --workspace=apps/api

      - name: Seed database
        run: npm run db:seed --workspace=apps/api

      - name: E2E tests
        run: npm run test:e2e --workspace=apps/api
