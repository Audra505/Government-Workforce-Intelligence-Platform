# Government Workforce Intelligence Platform — Docker Compose
# References: spec/08_deployment_architecture.md, environment/01_environment_strategy.md
#
# Phase 1 services: postgres only
# Full service stack (frontend, api) added in Milestone 9 (Docker Environment)
# when both applications build successfully and DB schema is established.

services:
  postgres:
    image: postgres:16-alpine
    container_name: gov_workforce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-govplatform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-gov_workforce_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-govplatform} -d ${POSTGRES_DB:-gov_workforce_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: gov_workforce_postgres_data
